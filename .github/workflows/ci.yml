name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      # fiber only supports x86_64 (System V ABI and Windows). GitHub's macOS
      # runners are ARM64 and the context switch is x86_64-only, so macOS is
      # intentionally omitted from the matrix.
      matrix:
        os: [ubuntu-latest, windows-latest]
        optimize: [Debug, ReleaseSafe, ReleaseFast, ReleaseSmall]
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Doptimize=${{ matrix.optimize }}

      - name: Test
        run: zig build test -Doptimize=${{ matrix.optimize }}

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check .
