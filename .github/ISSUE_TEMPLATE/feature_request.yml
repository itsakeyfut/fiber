name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please provide enough information to help us evaluate and prioritize it.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the feature in 1-2 sentences.
      placeholder: Add aarch64 context-switch support so fibers can run natively on ARM64.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Who benefits from it?
      placeholder: |
        I want to run fiber-based coroutines on Apple Silicon and ARM64 servers.
        Today src/arch/context.zig rejects any non-x86_64 target at comptime, so the
        library can't be used outside x86_64 Linux/Windows.

        Target user: developers on aarch64 (macOS, ARM64 Linux) who want stackful coroutines
    validations:
      required: true

  - type: textarea
    id: detailed_description
    attributes:
      label: Detailed Description
      description: Describe the desired behavior, API shape, and any edge cases to consider.
      placeholder: |
        An aarch64 implementation behind the existing arch interface
        (`Context`, `fiberSwap`, `initStack`):
        - New `src/arch/aarch64.zig` wired into the switch in `src/arch/context.zig`
        - Save/restore the AArch64 callee-saved registers (x19-x30, sp, and v8-v15)
        - Seed the initial stack so the first switch enters the trampoline correctly

        ```zig
        var f = try Fiber.create(allocator, &work);
        defer f.destroy();
        while (f.state != .done) f.resumeFiber(); // works on aarch64 too
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you tried or considered?
      placeholder: |
        - Keep x86_64 only and run under emulation (Rosetta / qemu): not native, slower
        - Use OS primitives (ucontext / Windows Fibers): heavier and less portable
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: Links to prior art, related issues, or design notes.
      placeholder: |
        - Boost.Context (aarch64 asm): https://github.com/boostorg/context
        - libco: https://github.com/higan-emu/libco
        - Related issue: #45
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Low - Nice to have
        - Medium - Would improve my workflow
        - High - Blocking my use case
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to help implement this feature
          required: false
        - label: I can provide test cases
          required: false
        - label: I can help with documentation
          required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: This feature aligns with the project's goals (a minimal, portable stackful fiber/coroutine library for Zig)
          required: false
