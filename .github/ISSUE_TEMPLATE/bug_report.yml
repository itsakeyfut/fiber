name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide detailed information to help us understand and fix the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the bug in 1-2 sentences.
      placeholder: XMM6 is clobbered across Fiber.yield() on Windows x64, so a value set before yield() is lost after resume.
    validations:
      required: true

  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behavior
      description: What is currently happening?
      placeholder: |
        A fiber that loads a value into XMM6, calls `yield()`, and reads XMM6 back
        after being resumed sees a different value. The register appears not to be
        preserved across the context switch when the caller touches XMM6 in between.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: |
        Callee-saved state (GP registers, XMM6-XMM15, MXCSR/x87 control words) should
        survive `yield()`/`resumeFiber()` so the fiber observes exactly what it left
        behind before yielding.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the bug.
      placeholder: |
        ```zig
        fn work(_: *Fiber) void {
            // set some callee-saved state, then yield
            Fiber.yield();
            // observe that the state is unexpectedly changed here
        }

        var f = try Fiber.create(allocator, &work);
        defer f.destroy();
        while (f.state != .done) f.resumeFiber();
        ```

        Or run: `zig build test`
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: Error Output / Stack Trace
      description: Include any error messages, panics, or stack traces.
      placeholder: |
        thread 12345 panic: fiber trampoline returned unexpectedly
        src/fiber.zig:92:5: 0x... in trampolineTrap (fiber)
        src/arch/x86_64_win.zig:... 0x... in fiberSwap (fiber)
        ...
      render: shell

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: Which version or git commit of fiber are you using?
      placeholder: "commit eba9833 (or tag v0.1.0)"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide your environment information.
      placeholder: |
        - OS: Ubuntu 24.04 / Windows 11
        - Zig: 0.16.0 (output of `zig version`)
        - Architecture: x86_64 (only x86_64 is supported; macOS/aarch64 are not yet)
        - Optimize mode: Debug / ReleaseSafe / ReleaseFast / ReleaseSmall
      render: markdown
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context that might be helpful (minimal repro, related issues, workarounds).
      placeholder: |
        - Only reproducible on Windows x64, not on Linux (System V)
        - Only happens under ReleaseFast, not Debug
        - Related to issue #123
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided a minimal reproduction case
          required: true
        - label: I have tested on the latest commit
          required: false
